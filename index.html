
<!DOCTYPE html>
<html>
<head>
    <title>🔒 Форум закрыт</title>
    <meta charset="UTF-8">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { font-size: 48px; margin: 0; }
        p { font-size: 18px; opacity: 0.9; }
        .premium { 
            background: gold; 
            color: #333; 
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔒 Premium доступ</h1>
        <p>Форум временно закрыт для оформления подписки.</p>
        <p>Приносим извинения за неудобства.</p>
        <div class="premium">⭐ Спасибо за понимание</div>
    </div>
</body>
</html>
